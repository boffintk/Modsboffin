<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoffinTK - Mods Recomendados FNF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://source.unsplash.com/random/1920x1080/?music,neon') center/cover no-repeat;
        }
        
        /* Glow effects */
        .glow-btn {
            transition: all 0.4s ease;
            box-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e;
        }
        .glow-btn:hover {
            box-shadow: 0 0 30px #22c55e, 0 0 60px #22c55e;
            transform: translateY(-3px);
        }

        .glow-green {
            box-shadow: 0 0 25px #22c55e, 0 0 50px #22c55e;
        }

        h1, h2, h3 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: -2px;
        }

        .mod-item:hover { 
            background-color: #27272a; 
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-md border-b border-green-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="font-black text-4xl tracking-tighter">BOFFINTK</span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-lg font-medium">
                <a href="#inicio" class="hover:text-green-400 transition">Inicio</a>
                <a href="#elegir" class="hover:text-green-400 transition">Elegir Mod</a>
                <a href="#mixes" class="hover:text-green-400 transition">Mixes</a>
                <button onclick="showCredits()" class="hover:text-green-400 transition">Credits</button>
                <a href="https://discord.gg/TuPycP9N" target="_blank" class="text-3xl hover:text-indigo-400 transition">
                    <i class="fab fa-discord"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section id="inicio" class="hero-bg h-screen flex items-center">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-7xl md:text-8xl font-black mb-6 tracking-tighter leading-none">
                MODS RECOMENDADOS<br>
                <span class="text-green-400">DE BOFFINTK</span>
            </h1>
            <p class="text-2xl md:text-3xl text-green-300 mb-12 font-light">Los mejores mods de Friday Night Funkin'</p>
            
            <button onclick="document.getElementById('elegir').scrollIntoView({ behavior: 'smooth' })" 
                    class="glow-btn bg-green-500 hover:bg-green-600 text-black font-bold text-2xl px-14 py-7 rounded-3xl transition-all active:scale-95">
                ELEGIR MOD
            </button>
        </div>
    </section>

    <!-- ELEGIR MOD + BUSCADOR -->
    <section id="elegir" class="py-24 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <h2 class="text-5xl font-black tracking-tighter">Elegir Mod</h2>
                
                <div class="relative w-full md:w-96">
                    <input id="searchInput" 
                           type="text" 
                           placeholder="Buscar mod... (ej: garcello, tricky)"
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl py-5 px-6 pl-12 focus:outline-none focus:border-green-500 text-lg">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 text-xl"></i>
                </div>
            </div>

            <div id="mods-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Generado con JavaScript -->
            </div>
        </div>
    </section>

    <!-- MIXES -->
    <section id="mixes" class="py-24 bg-black">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-black text-center mb-16 tracking-tighter">Mixes</h2>
            
            <div class="grid md:grid-cols-3 lg:grid-cols-4 gap-8">
                <a href="https://gamebanana.com/mods/615366" target="_blank" class="mix-card block bg-zinc-900 rounded-3xl p-8 text-center glow-green hover:bg-zinc-800 transition-all">
                    <h3 class="text-3xl font-bold mb-2">Darnell's Mixtape</h3>
                    <p class="text-green-400">Gran variedad de mixes</p>
                </a>

                <a href="https://gamebanana.com/mods/602414" target="_blank" class="mix-card block bg-zinc-900 rounded-3xl p-8 text-center glow-green hover:bg-zinc-800 transition-all">
                    <h3 class="text-3xl font-bold mb-2">Sky Mixes</h3>
                    <p class="text-green-400">Sky: Reborn</p>
                </a>

                <a href="https://gamebanana.com/mods/661165" target="_blank" class="mix-card block bg-zinc-900 rounded-3xl p-8 text-center glow-green hover:bg-zinc-800 transition-all">
                    <h3 class="text-3xl font-bold mb-2">2Hot Sky Mix</h3>
                    <p class="text-green-400">Remix especial</p>
                </a>

                <a href="https://gamebanana.com/mods/553809" target="_blank" class="mix-card block bg-zinc-900 rounded-3xl p-8 text-center glow-green hover:bg-zinc-800 transition-all">
                    <h3 class="text-3xl font-bold mb-2">Girlfriend Mixes</h3>
                    <p class="text-green-400">GF al frente</p>
                </a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-black py-12 text-center">
        <div class="flex justify-center gap-8 text-3xl mb-6">
            <a href="https://discord.gg/TuPycP9N" target="_blank" class="hover:text-indigo-400 transition">
                <i class="fab fa-discord"></i>
            </a>
        </div>
        <button onclick="showCredits()" 
                class="glow-btn bg-green-500 hover:bg-green-600 text-black px-10 py-5 rounded-3xl font-bold text-lg">
            Credits
        </button>
    </footer>

    <!-- MODAL CREDITS -->
    <div id="credits-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl p-10 max-w-md text-center">
            <h3 class="text-3xl font-bold mb-6">Credits</h3>
            <p class="text-2xl mb-8">Creator: <span class="text-green-400 font-bold">Boffin</span></p>
            <button onclick="hideCredits()" 
                    class="glow-btn bg-green-500 text-black px-10 py-4 rounded-3xl font-bold">
                Cerrar
            </button>
        </div>
    </div>

    <script>
        const mods = [
            { name: "VS Garcello", link: "https://gamebanana.com/mods/166531" },
            { name: "Garcello Español", link: "https://gamebanana.com/mods/394831" },
            { name: "VS Chavo del 8", link: "https://gamebanana.com/mods/609378" },
            { name: "VS Hex", link: "https://gamebanana.com/mods/44225" },
            { name: "VS Kapi", link: "https://gamebanana.com/mods/44683" },
            { name: "VS Tricky", link: "https://gamebanana.com/mods/44334" },
            { name: "QT Rewired", link: "https://gamebanana.com/mods/566597" },
            { name: "VS Tabi", link: "https://gamebanana.com/mods/286388" },
            { name: "VS Whitty", link: "https://gamebanana.com/mods/2682" },
            { name: "VS Shaggy", link: "https://gamebanana.com/mods/2860" },
            { name: "VS Among Us", link: "https://gamebanana.com/mods/55652" },
            { name: "VS Huggy Wuggy 2026", link: "https://gamebanana.com/mods/670164" },
            { name: "VS Sky", link: "https://gamebanana.com/mods/44555" },
            { name: "VS Darnell", link: "https://gamebanana.com/mods/384356" },
            { name: "Darnell's Mixtape", link: "https://gamebanana.com/mods/615366" },
            { name: "2Hot vs Boyfriend", link: "https://gamebanana.com/mods/308000" }
        ];

        function renderMods(filteredMods) {
            const container = document.getElementById('mods-list');
            container.innerHTML = '';
            filteredMods.forEach(mod => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-800 rounded-3xl p-6 mod-item cursor-pointer transition';
                div.innerHTML = `
                    <h3 class="text-2xl font-bold mb-6">${mod.name}</h3>
                    <a href="${mod.link}" target="_blank" 
                       class="glow-btn block bg-green-500 hover:bg-green-600 text-black text-center py-5 rounded-3xl font-bold text-lg transition-all">
                        DESCARGAR
                    </a>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = mods.filter(mod => mod.name.toLowerCase().includes(term));
            renderMods(filtered);
        });

        renderMods(mods);

        function showCredits() {
            document.getElementById('credits-modal').classList.remove('hidden');
        }
        
        function hideCredits() {
            document.getElementById('credits-modal').classList.add('hidden');
        }
    </script>
</body>
      </html>
